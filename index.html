<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" href="./logo.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mount Zion College of Nursing</title>

</head>
<body>


  <script>
    const DEV_SERVER_URL = "http://localhost:5173";
    


    async function tryRedirect() {
      try {
        // Test connectivity quickly
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 800);
        
        await fetch(DEV_SERVER_URL, { mode: 'no-cors', signal: controller.signal });
        
        // Success! Redirect immediately
        window.location.replace(DEV_SERVER_URL);
      } catch (err) {
        // Server not ready, keep checking
        setTimeout(tryRedirect, 500);
      }
    }

    tryRedirect();
  </script>
</body>
</html>
