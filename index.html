<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/webp" href="./logo.webp" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <title>Mount Zion College of Nursing</title>
  <style>
    .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 20px;
        background-color: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
    }
    .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #e2e8f0;
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }
    .loading-text {
        font-size: 1.2rem;
        color: #64748b;
        font-weight: 500;
        animation: pulse 1.5s ease-in-out infinite;
    }
    .status-note {
        font-size: 0.9rem;
        color: #94a3b8;
        max-width: 300px;
        text-align: center;
        line-height: 1.4;
    }
    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-container">
        <div class="spinner"></div>
        <div class="loading-text">Connecting to Live Site...</div>
        <div class="status-note">
            Opening the local website. If this takes too long, make sure <strong>start-site.bat</strong> is running.
        </div>
    </div>
  </div>
  <script>
    const DEV_SERVER_URL = "http://localhost:5173";
    
    async function tryRedirect() {
      try {
        // Try to reach the dev server. 
        // We use 'no-cors' and a timeout to check if the server is responsive.
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 1000);
        
        await fetch(DEV_SERVER_URL, { mode: 'no-cors', signal: controller.signal });
        
        // If fetch succeeds (or responds), redirect immediately
        window.location.href = DEV_SERVER_URL;
      } catch (err) {
        // Server not ready yet, check again in 1 second
        setTimeout(tryRedirect, 1000);
      }
    }

    // Start the redirect check
    tryRedirect();
  </script>
</body>
</html>
